<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
<header class="bg-blue-600 dark:bg-blue-800 text-white p-6 flex justify-between items-center">
  <h1 class="text-2xl font-bold">TaskFlow</h1>

  <button
    id="theme-toggle"
    class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200 transition dark:bg-gray-700 dark:text-yellow-300 dark:hover:bg-gray-600"
    type="button"
    aria-pressed="false"
    aria-label="Cambiar a modo oscuro"
  >
    🌙 Modo oscuro
  </button>
</header>

<div class="grid gap-6 p-4 md:grid-cols-4 md:p-6">

<aside class="col-span-1 bg-white dark:bg-gray-800 p-4 rounded-xl shadow">

  <h2 class="text-lg font-semibold mb-4">Categorías</h2>

  <div class="flex gap-2 mb-3">
    <label for="category-input" class="sr-only">Nueva categoría</label>
    <input
      id="category-input"
      type="text"
      placeholder="Nueva categoría..."
      class="flex-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600 text-sm"
    >
    <button
      id="category-add"
      type="button"
      class="px-3 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 active:scale-[0.98] transition focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
      Añadir
    </button>
  </div>

  <ul id="category-list" class="space-y-2 mb-6"></ul>

  <label for="task-search" class="sr-only">Buscar tareas</label>
  <input
    type="text"
    id="task-search"
    placeholder="Buscar tareas..."
    class="w-full p-2 rounded border dark:bg-gray-700"
  >

</aside>

<main class="col-span-3 space-y-6">

<section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">

  <h2 class="text-xl font-semibold mb-4">Crear tarea</h2>

  <form id="task-form" class="flex flex-wrap gap-2 mb-4 items-center">
    <div class="flex-1 min-w-[180px]">
      <label for="task-input" class="sr-only">Nueva tarea</label>
      <input
        type="text"
        id="task-input"
        placeholder="Escribe una nueva tarea..."
        required
        class="w-full p-2 rounded border dark:bg-gray-700"
      >
    </div>

    <div>
      <label for="task-category" class="sr-only">Categoría</label>
      <select
        id="task-category"
        class="p-2 rounded border bg-white dark:bg-gray-700 dark:border-gray-600 text-sm"
      ></select>
    </div>

    <div>
      <label for="task-priority" class="sr-only">Prioridad</label>
      <select
        id="task-priority"
        class="p-2 rounded border bg-white dark:bg-gray-700 dark:border-gray-600 text-sm"
      >
        <option value="low">Baja</option>
        <option value="medium" selected>Media</option>
        <option value="high">Alta</option>
      </select>
    </div>

    <div>
      <label for="task-due-date" class="sr-only">Fecha límite</label>
      <input
        type="date"
        id="task-due-date"
        class="p-2 rounded border bg-white dark:bg-gray-700 dark:border-gray-600 text-sm"
      >
    </div>

    <button
      type="submit"
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
    >
      Añadir
    </button>
  </form>

</section>

<section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">

  <div class="flex flex-col gap-3 mb-4 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-xl font-semibold">
      Tareas Pendientes (<span id="task-count">0</span>)
    </h2>

    <div class="flex flex-wrap gap-2">
      <button
        id="bulk-complete-all"
        type="button"
        class="px-3 py-2 rounded-lg text-sm font-semibold bg-emerald-600 text-white hover:bg-emerald-700 active:scale-[0.98] transition focus:outline-none focus:ring-2 focus:ring-emerald-400"
      >
        Completar todas
      </button>

      <button
        id="bulk-delete-completed"
        type="button"
        class="px-3 py-2 rounded-lg text-sm font-semibold bg-amber-500 text-black hover:bg-amber-600 active:scale-[0.98] transition focus:outline-none focus:ring-2 focus:ring-amber-300"
      >
        Borrar completadas
      </button>

      <button
        id="bulk-clear-all"
        type="button"
        class="px-3 py-2 rounded-lg text-sm font-semibold bg-red-600 text-white hover:bg-red-700 active:scale-[0.98] transition focus:outline-none focus:ring-2 focus:ring-red-400"
      >
        Vaciar todo
      </button>
    </div>
  </div>

  <div id="task-list" class="space-y-3"></div>

</section>

<section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">

  <h2 class="text-xl font-semibold mb-4">Tareas Completadas</h2>

  <div id="completed-list" class="space-y-3"></div>

</section>

</main>
</div>

<script src="app.js"></script>
<script src="theme.js"></script>

</body>
</html>
